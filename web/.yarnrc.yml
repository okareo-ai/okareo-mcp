# Use the traditional node_modules layout instead of Plug'n'Play.
#
# Rationale: keeps the Docker web-builder stage conventional (standard
# yarn install + node_modules/), matches appfrontend's setup, and avoids
# bundling .pnp.cjs / .yarn/ into the build context.
#
# After changing this, re-run `yarn install` locally — yarn will regenerate
# node_modules/ and update yarn.lock. The .pnp.cjs and .yarn/cache files
# can then be deleted (or left alone; they're gitignored).

nodeLinker: node-modules
